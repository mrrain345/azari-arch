distro: arch
name: Azari
image: ghcr.io/mrrain345/azari-arch
hostname: azari

import:
  - bootc.yaml
  - passwd.yaml
  - update.yaml
  - aur.yaml
  - locale.yaml
  - user.yaml
  - hardware.yaml
  - packages.yaml
  - fonts.yaml
  - development.yaml
  - hyprland.yaml

postinstall:
  - env KERNEL_VERSION=$(pacman -Q linux | cut -d ' ' -f 2 | sed 's/\.arch/-arch/')
    bash -c 'dracut --force --kver $KERNEL_VERSION /usr/lib/modules/$KERNEL_VERSION/initramfs.img'
  - rm -rf /boot/* /run/* /tmp/* /var/tmp/* /var/cache/* /var/lib/dkms
    /var/home/*/.cache/* /home/*/.cargo /home/*/.gnupg /home/*/.config/go /home/*/.local/state
