distro: arch
name: AzariOS
image: ghcr.io/mrrain345/azari-arch
hostname: azari

import:
  - ostree.yaml
  - locale.yaml
  - user.yaml
  - hardware.yaml
  - packages.yaml
  - fonts.yaml
  - aur.yaml
  - development.yaml
  - hyprland.yaml

postinstall:
  - systemctl enable NetworkManager
  - systemctl enable fwupd
  - systemctl enable cups
  - systemctl enable bluetooth
  - systemctl enable power-profiles-daemon
  - bootc container lint
