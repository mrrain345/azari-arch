distro: arch
name: Azari
image: ghcr.io/mrrain345/azari-arch
hostname: azari

import:
  - bootc.yaml
  - locale.yaml
  - user.yaml
  - hardware.yaml
  - packages.yaml
  - fonts.yaml
  - aur.yaml
  - development.yaml
  - hyprland.yaml

postinstall:
  - systemctl enable NetworkManager fwupd cups bluetooth power-profiles-daemon
  - rm -rf /var/cache/* /run/* /tmp/* /var/tmp/*
    /var/home/*/.cache/* /home/*/.cargo/registry/cache/* /home/*/.cargo/git/db/* /home/*/.cargo/git/checkouts/*
  - bootc container lint
