packages:
  - linux-headers
  - networkmanager
  - fwupd
  - cups
  - bluez
  - lshw
  - intel-ucode
  - power-profiles-daemon

  - mesa
  - mesa-utils
  # - nvidia-open-dkms
  # - nvidia-utils
  - nvidia-prime
  - libva-nvidia-driver
  - intel-media-driver
  - libva-utils
  - vulkan-intel

  - gstreamer
  - gst-plugins-base
  - gst-plugins-good
  - gst-plugins-bad
  - gst-plugins-ugly
  - gst-libav

  - pipewire
  - pipewire-audio
  - pipewire-alsa
  - pipewire-pulse
  - wireplumber
  - pavucontrol
  - sof-firmware

postinstall:
  - pacman -U --noconfirm https://archive.archlinux.org/packages/n/nvidia-open-dkms/nvidia-open-dkms-575.64.05-2-x86_64.pkg.tar.zst \
    https://archive.archlinux.org/packages/n/nvidia-utils/nvidia-utils-575.64.05-2-x86_64.pkg.tar.zst
  - dkms autoinstall -k $(ls -1 /usr/lib/modules | sort -Vr | head -n 1)
  - systemctl enable nvidia-suspend.service nvidia-hibernate.service nvidia-resume.service
