packages:
  - linux-headers
  - networkmanager
  - fwupd
  - cups
  - bluez
  - lshw
  - intel-ucode
  - power-profiles-daemon

  - mesa
  - mesa-utils
  - nvidia-open-dkms
  - nvidia-utils
  - nvidia-prime
  - libva-nvidia-driver
  - intel-media-driver
  - libva-utils
  - vulkan-intel
  - vulkan-mesa-layers
  - vulkan-tools

  - gstreamer
  - gst-plugins-base
  - gst-plugins-good
  - gst-plugins-bad
  - gst-plugins-ugly
  - gst-libav

  - pipewire
  - pipewire-audio
  - pipewire-alsa
  - pipewire-pulse
  - pipewire-jack
  - wireplumber
  - pavucontrol
  - sof-firmware

postinstall:
  - env NVIDIA_VERSION=$(pacman -Q nvidia-open-dkms | cut -d ' ' -f 2 | cut -d '-' -f 1)
    KERNEL_VERSION=$(pacman -Q linux | cut -d ' ' -f 2 | sed 's/\.arch/-arch/')
    bash -c 'mkdir -p /usr/lib/modules/$KERNEL_VERSION/extramodules/ &&
    cp -r /var/lib/dkms/nvidia/$NVIDIA_VERSION/$KERNEL_VERSION/x86_64/module/* /usr/lib/modules/$KERNEL_VERSION/extramodules/ &&
    depmod -a -b /usr $KERNEL_VERSION && rm -rf /var/lib/dkms/nvidia'
  - systemctl enable nvidia-suspend nvidia-hibernate nvidia-resume
