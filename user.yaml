users:
  mrrain:
    fullname: MrRaiN
    uid: 1000
    shell: /bin/fish
    groups:
      - wheel

files:
  "/etc/sudoers.d/10-wheel":
    content: |
      %wheel ALL=(ALL) ALL

  "/etc/xdg/user-dirs.defaults":
    content: |
      PROJECTS=Code
      DOCUMENTS=Documents
      DOWNLOAD=Downloads
      MUSIC=Music
      PICTURES=Pictures
      VIDEOS=Videos
      DESKTOP=.local/share/desktop
      TEMPLATES=.local/share/templates
      PUBLICSHARE=.local/share/public

  "/etc/systemd/system/getty@tty1.service.d/autologin.conf":
    content: |
      [Service]
      ExecStart=
      ExecStart=-/usr/bin/agetty --noreset --noclear --autologin mrrain - ${TERM}

  "/etc/pam.d/login":
    content: |
      #%PAM-1.0

      auth       requisite    pam_nologin.so
      auth       include      system-local-login
      auth       optional     pam_gnome_keyring.so
      account    include      system-local-login
      session    include      system-local-login
      session    optional     pam_gnome_keyring.so auto_start
      password   include      system-local-login

  "/etc/pam.d/hyprlock":
    content: |
      #%PAM-1.0

      auth        include     login
      account     include     login
      session     include     login
      password    include     login

  "/var/home/mrrain/install.sh":
    owner: mrrain
    group: mrrain
    mode: 755
    content: |
      #/bin/sh

      gsettings set org.gnome.desktop.interface color-scheme prefer-dark
      gsettings set org.gnome.desktop.privacy remember-recent-files false

      git clone https://github.com/mrrain345/azari-arch.git ~/Code/azari-arch
      stow --dir ~/Code/azari-arch/dotfiles --target ~ .

      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh

      flatpak install app.drey.EarTag \
        com.belmoussaoui.Authenticator \
        com.github.tchx84.Flatseal \
        com.google.Chrome \
        com.obsproject.Studio \
        io.bassi.Amberol \
        io.github.celluloid_player.Celluloid \
        io.github.kolunmi.Bazaar \
        io.missioncenter.MissionCenter \
        it.mijorus.smile \
        org.gnome.Calculator \
        org.gnome.Loupe \
        org.gnome.TextEditor \
        org.gnome.World.PikaBackup \
        org.nickvision.tubeconverter \
        org.signal.Signal

postinstall:
  - usermod -aG docker,audio,video mrrain
