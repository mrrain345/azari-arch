packages:
  - git
  - podman
  - rust
  - npm
  - docker
  - docker-compose
  - docker-buildx
  - nvidia-container-toolkit

systemd:
  docker:
    socket:
      enabled: true

postinstall:
  - CARGO_HOME=/tmp/cargo cargo install --locked --no-track --root /usr --git https://github.com/mrrain345/azari-cli.git && rm -rf /tmp/cargo
  - su mrrain -c 'GOPATH=~/.cache/go paru -S --noconfirm openclaw gogcli'
