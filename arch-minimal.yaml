distro: arch
image: ghcr.io/mrrain345/azari-minimal
name: Azari
hostname: azari

packages:
  - sudo
  - networkmanager
  - podman
  - rust
  - git

users:
  mrrain:
    fullname: MrRaiN
    uid: 1000
    shell: /bin/fish
    groups:
      - wheel

files:
  "/etc/sudoers.d/10-wheel":
    content: |
      %wheel ALL=(ALL) ALL

postinstall:
  - CARGO_HOME=/tmp/cargo cargo install --locked --no-track --root /usr --git https://github.com/mrrain345/azari-cli.git \
    && rm -rf /tmp/cargo
