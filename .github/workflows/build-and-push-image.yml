name: Build and Push Azari Image

on:
  schedule:
    # Run every Tuesday at 00:00 UTC
    - cron: "0 0 * * 2"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-and-push-image.yml"
      - "**/*.yaml"
      - "!dotfiles/**"
      - "!.vscode/**"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Azari CLI
        run: |
          cargo install --locked --no-track --git https://github.com/mrrain345/azari-cli.git
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Compute dynamic version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          YY="$(date -u +%y)"
          MONTH="$(date -u +%-m)"
          PACKAGE_NAME="${GITHUB_REPOSITORY#*/}"

          EXISTING_TAGS="$(
            gh api \
              "users/${GITHUB_REPOSITORY_OWNER}/packages/container/${PACKAGE_NAME}/versions?per_page=100" \
              --jq '.[].metadata.container.tags[]?' 2>/dev/null || \
            gh api \
              "orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/${PACKAGE_NAME}/versions?per_page=100" \
              --jq '.[].metadata.container.tags[]?' 2>/dev/null || \
            true
          )"

          LAST_PATCH="$(printf '%s\n' "$EXISTING_TAGS" \
            | grep -E "^${YY}\\.${MONTH}\\.[0-9]+$" \
            | cut -d. -f3 \
            | sort -n \
            | tail -n1 || true)"

          if [ -z "$LAST_PATCH" ]; then
            PATCH="0"
          else
            PATCH="$((LAST_PATCH + 1))"
          fi

          IMAGE_VERSION="${YY}.${MONTH}.${PATCH}"
          echo "IMAGE_VERSION=${IMAGE_VERSION}" >> "$GITHUB_ENV"
          echo "Using version: ${IMAGE_VERSION}"

      - name: Build image
        run: |
          azari build --config ./azari.yaml --version "${{ env.IMAGE_VERSION }}" --image "${{ env.IMAGE }}"

      - name: Push image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io --username "${{ github.actor }}" --password-stdin
          azari push --config ./azari.yaml --version "${{ env.IMAGE_VERSION }}" --image "${{ env.IMAGE }}"
