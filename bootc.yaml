packages:
  - podman
  - bubblewrap

files:
  "/usr/lib/ostree/prepare-root.conf":
    content: |
      [etc]
      transient=true
      [composefs]
      enabled=yes

  "/usr/lib/composefs/setup-root-conf.toml":
    content: |
      [etc]
      transient=true

  # Fix resolv.conf permission issues
  "/usr/lib/tmpfiles.d/azari-resolv.conf":
    content: |
      z /etc/resolv.conf 0644 root root - -
