packages:
  - hyprland
  - hyprlock
  - hyprpolkitagent
  - hyprshutdown
  - hypridle
  - hyprpaper
  - hyprpicker
  - hyprshot
  - cliphist
  - cava

  - uwsm
  - gnome-keyring
  - libsecret
  - wl-clip-persist
  - xdg-desktop-portal-gtk
  - xdg-desktop-portal-hyprland
  - xdg-user-dirs
  - gvfs-mtp
  - ffmpegthumbnailer
  - adwaita-icon-theme

  - ghostty
  - nautilus
  - file-roller
  - papers
  - ghostty-nautilus
  - code
  - gnome-disk-utility

systemd:
  hyprpolkitagent:
    user: true
    service:
      enabled: true
  hypridle:
    user: true
    service:
      enabled: true
  hyprpaper:
    user: true
    service:
      enabled: true

postinstall:
  - su mrrain -c "paru -S --noconfirm ffmpeg-audio-thumbnailer code-marketplace noctalia-shell"
