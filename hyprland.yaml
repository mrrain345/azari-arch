packages:
  - hyprland
  - hyprlock
  - hyprpolkitagent
  - hypridle
  - hyprpaper
  - hyprpicker
  - hyprshot
  - cava

  - uwsm
  - gnome-keyring
  - libsecret
  - wl-clip-persist
  - xdg-desktop-portal-gtk
  - xdg-desktop-portal-hyprland
  - xdg-user-dirs
  - gvfs-mtp
  - ffmpegthumbnailer
  - adwaita-icon-theme

  - ghostty
  - nautilus
  - file-roller
  - papers
  - ghostty-nautilus
  - code
  - gnome-disk-utility

postinstall:
  - su mrrain -c "paru -S --noconfirm ffmpeg-audio-thumbnailer code-marketplace hyprnome noctalia-shell"
  - systemctl enable --global hyprpolkitagent
  - systemctl enable --global hypridle
  - systemctl enable --global hyprpaper
