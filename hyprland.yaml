packages:
  - hyprland
  - hyprlock
  - hyprpolkitagent
  - hypridle
  - hyprpaper
  - hyprpicker
  - hyprshot
  - dms-shell
  - cava

  - uwsm
  - gnome-keyring
  - libsecret
  - wl-clip-persist
  - xdg-desktop-portal-gtk
  - xdg-desktop-portal-hyprland
  - xdg-user-dirs

  - ghostty
  - nautilus
  - ghostty-nautilus
  - code
  - gnome-disk-utility

postinstall:
  - systemctl enable --global hyprpolkitagent
  - systemctl enable --global hypridle
  - systemctl enable --global hyprpaper
  - systemctl enable --global dms
